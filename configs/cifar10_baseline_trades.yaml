# Baseline 2: TRADES (Zhang et al. 2019).
name: baseline_trades
base: trades
out_dir: ./runs/baseline_trades
resume_from: ./runs/clean_pretrain/checkpoints/final.pt

model:
  arch: preact_resnet18

attack:
  epsilon: 0.03137254901960784
  alpha: 0.00784313725490196
  steps: 10
  norm: linf

trades:
  beta: 6.0

optim:
  epochs: 30
  lr: 0.01
  lr_schedule: multistep
  milestones: [15, 25]
  weight_decay: 5.0e-4

data:
  dataset: cifar10
  batch_size: 128

eval_every: 2
save_every: 5
log_every: 100
