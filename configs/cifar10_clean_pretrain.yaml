# Phase 1 of the standard workflow: train a plain, non-adversarial classifier.
# Everything downstream (SAE pretraining, all AT baselines, the proposed
# method) starts from this checkpoint via resume_from, so every method is
# compared from the same initialization.
name: clean_pretrain
base: clean
out_dir: ./runs/clean_pretrain

model:
  arch: preact_resnet18

optim:
  epochs: 60
  lr: 0.1
  lr_schedule: multistep
  milestones: [30, 45]
  lr_gamma: 0.1
  weight_decay: 5.0e-4

data:
  dataset: cifar10
  batch_size: 128

eval_every: 5
save_every: 10
log_every: 100
