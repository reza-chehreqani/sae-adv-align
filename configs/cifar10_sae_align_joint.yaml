# Proposed method, drift-control option 3: SAE parameters updated every
# step via their own Adam optimizer + reconstruction loss (alternating
# optimization, detached from the backbone's graph). Most flexible, least
# outside evidence -- treat as a stretch-goal comparison against option 2.
name: sae_align_joint
base: madry
out_dir: ./runs/sae_align_joint
resume_from: ./runs/clean_pretrain/checkpoints/final.pt

model:
  arch: preact_resnet18
  feature_layer: auto

attack:
  epsilon: 0.03137254901960784
  alpha: 0.00784313725490196
  steps: 10
  norm: linf

sae:
  reduce: gap
  kind: topk
  dict_size: 4096
  k: 32
  tied_weights: false
  normalize_decoder: true
  pretrained_path: ./runs/sae_pretrain/sae.pt   # still used as the SAE's initialization

drift:
  mode: joint
  sae_lr: 1.0e-3
  fvu_alarm_threshold: 0.5

align:
  enabled: true
  space: sae
  kind: l2
  weight: 1.0
  stop_grad_clean: true

optim:
  epochs: 30
  lr: 0.01
  lr_schedule: multistep
  milestones: [15, 25]
  weight_decay: 5.0e-4

data:
  dataset: cifar10
  batch_size: 128

eval_every: 2
save_every: 5
log_every: 100
